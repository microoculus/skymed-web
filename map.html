<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Zoomable Map with Fixed Markers</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      touch-action: none;
    }

    .map-container {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      position: relative;
      background-color: #f0f0f0;
    }

    .map-inner {
      position: absolute;
      top: 0;
      left: 0;
      transform-origin: top left;
      cursor: grab;
    }

    .map-inner img {
      display: block;
      max-width: none;
    }

    .map-marker {
      position: absolute;
      width: 20px;
      height: 20px;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .map-marker img {
      width: 100%;
      height: auto;
    }

    .point-name {
      display: block;
      font-size: 12px;
      text-align: center;
      margin-top: 2px;
      color: black;
    }
  </style>
</head>
<body>

<div class="map-container" id="map-container">
  <div class="map-inner" id="map-inner">
    <img src="img/map.svg" class="map-image" alt="Map">
  </div>

  <!-- Markers -->
  <div class="map-marker" data-x="69" data-y="51"><img src="img/map-point.svg"><span class="point-name">India</span></div>
  <div class="map-marker" data-x="62" data-y="48.7"><img src="img/map-point.svg"><span class="point-name">UAE</span></div>
  <div class="map-marker" data-x="56.2" data-y="31.7"><img src="img/map-point.svg"><span class="point-name">Ukraine</span></div>
  <div class="map-marker" data-x="65" data-y="36.7"><img src="img/map-point.svg"><span class="point-name">Uzbekistan</span></div>
  <div class="map-marker" data-x="75.6" data-y="60.8"><img src="img/map-point.svg"><span class="point-name">Malaysia</span></div>
  <div class="map-marker" data-x="55.6" data-y="33.2"><img src="img/map-point.svg"><span class="point-name">Moldova</span></div>
  <div class="map-marker" data-x="59.3" data-y="36.2"><img src="img/map-point.svg"><span class="point-name">Georgia</span></div>
  <div class="map-marker" data-x="63.3" data-y="38.7"><img src="img/map-point.svg"><span class="point-name">Turkeministan</span></div>
  <div class="map-marker" data-x="67.5" data-y="38.7"><img src="img/map-point.svg"><span class="point-name">Tajikstan</span></div>
  <div class="map-marker" data-x="68.5" data-y="37"><img src="img/map-point.svg"><span class="point-name">Kirgystan</span></div>
  <div class="map-marker" data-x="60.6" data-y="37.2"><img src="img/map-point.svg"><span class="point-name">Azerbaijan</span></div>
  <div class="map-marker" data-x="61.5" data-y="47.2"><img src="img/map-point.svg"><span class="point-name">Bahrain</span></div>
  <div class="map-marker" data-x="62" data-y="47.7"><img src="img/map-point.svg"><span class="point-name">Qatar</span></div>
  <div class="map-marker" data-x="43.2" data-y="53.9"><img src="img/map-point.svg"><span class="point-name">Senegal</span></div>
  <div class="map-marker" data-x="45.5" data-y="59.4"><img src="img/map-point.svg"><span class="point-name">Ivorycost</span></div>
  <div class="map-marker" data-x="49.2" data-y="53.9"><img src="img/map-point.svg"><span class="point-name">Niger</span></div>
  <div class="map-marker" data-x="47.7" data-y="58.8"><img src="img/map-point.svg"><span class="point-name">Benin</span></div>
  <div class="map-marker" data-x="47.3" data-y="59"><img src="img/map-point.svg"><span class="point-name">Togo</span></div>
</div>

<script>
$(function () {
  const $mapContainer = $('#map-container');
  const $mapInner = $('#map-inner');
  const $markers = $('.map-marker');
  const mapImg = $mapInner.find('img.map-image')[0];

  let scale = 1;
  const minScale = 1;
  const maxScale = 3;
  let translateX = 0;
  let translateY = 0;
  let isDragging = false;
  let dragStartX = 0;
  let dragStartY = 0;

  let lastTouchDistance = null;

  function updateTransform() {
    $mapInner.css('transform', `translate(${translateX}px, ${translateY}px) scale(${scale})`);
    positionMarkers();
  }

  function positionMarkers() {
    const imgWidth = mapImg.naturalWidth * scale;
    const imgHeight = mapImg.naturalHeight * scale;

    $markers.each(function () {
      const $marker = $(this);
      const xPercent = parseFloat($marker.data('x'));
      const yPercent = parseFloat($marker.data('y'));

      const x = translateX + (xPercent / 100) * imgWidth;
      const y = translateY + (yPercent / 100) * imgHeight;

      $marker.css({ left: x + 'px', top: y + 'px' });
    });
  }

  // Mouse wheel zoom
  $mapContainer.on('wheel', function (e) {
    e.preventDefault();
    const delta = e.originalEvent.deltaY > 0 ? -0.1 : 0.1;
    let newScale = scale + delta;
    newScale = Math.min(maxScale, Math.max(minScale, newScale));
    if (newScale === scale) return;

    const rect = this.getBoundingClientRect();
    const mouseX = e.originalEvent.clientX - rect.left;
    const mouseY = e.originalEvent.clientY - rect.top;

    const zoomFactor = newScale / scale;
    translateX = mouseX - (mouseX - translateX) * zoomFactor;
    translateY = mouseY - (mouseY - translateY) * zoomFactor;

    scale = newScale;
    updateTransform();
  });

  // Touch support
  $mapContainer.on('touchstart', function (e) {
    if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      lastTouchDistance = Math.hypot(dx, dy);
    } else if (e.touches.length === 1) {
      isDragging = true;
      dragStartX = e.touches[0].clientX - translateX;
      dragStartY = e.touches[0].clientY - translateY;
    }
  });

  $mapContainer.on('touchmove', function (e) {
    e.preventDefault();
    if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const newDistance = Math.hypot(dx, dy);

      if (lastTouchDistance) {
        let zoom = newDistance / lastTouchDistance;
        let newScale = scale * zoom;
        newScale = Math.min(maxScale, Math.max(minScale, newScale));

        scale = newScale;
        lastTouchDistance = newDistance;
        updateTransform();
      }
    } else if (e.touches.length === 1 && isDragging) {
      translateX = e.touches[0].clientX - dragStartX;
      translateY = e.touches[0].clientY - dragStartY;
      updateTransform();
    }
  });

  $(document).on('touchend', function () {
    isDragging = false;
    lastTouchDistance = null;
  });

  // Desktop drag
  $mapContainer.on('mousedown', function (e) {
    isDragging = true;
    dragStartX = e.clientX - translateX;
    dragStartY = e.clientY - translateY;
  });

  $(document).on('mousemove', function (e) {
    if (!isDragging) return;
    translateX = e.clientX - dragStartX;
    translateY = e.clientY - dragStartY;
    updateTransform();
  });

  $(document).on('mouseup', function () {
    isDragging = false;
  });

  $(mapImg).on('load', function () {
    updateTransform();
  });

  if (mapImg.complete) {
    updateTransform();
  }
});
</script>

</body>
</html>
